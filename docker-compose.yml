version: '3.8'

services:
  # Base de Datos
  influxdb:
    image: influxdb:latest
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2

  # Lógica y Flujos
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    depends_on:
      - influxdb
    ports:
      - "1880:1880"
      - "9000:9000/udp"
    volumes:
      - node-red-data:/data

  # Visualización
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
  # Página Web
  flaskapp:
    build: ./flask_app
    container_name: flask_web
    ports:
      - "5000:5000"
    volumes:
      - ./flask_app:/app
    depends_on:
      - influxdb

volumes:
  influxdb-data:
  node-red-data:
  grafana-data:


